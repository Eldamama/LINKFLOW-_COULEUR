<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Validation don - LINK FLOW</title>
  <link rel="stylesheet" href="style.css">
  <script type="module">
    import { requireAuth } from './auth.js';
    import { supabase } from './supabase.js';

    const user = await requireAuth();
    
    window.validateDonation = async () => {
      const hash = document.getElementById('txHash').value.trim();
      const wallet = document.getElementById('wallet').value.trim();
      
      if (!hash || !wallet) {
        alert('Veuillez fournir le hash de transaction et votre adresse wallet');
        return;
      }
      
      const isValid = hash.startsWith('0xVictory') || hash.length > 5;
      if (!isValid) {
        alert('Hash invalide. Exemple valide : 0xVictory123...');
        return;
      }
      
      const { error: updateError } = await supabase
        .from('users')
        .update({ 
          donation_validated: true, 
          donation_tx_hash: hash, 
          donation_wallet: wallet 
        })
        .eq('id', user.id);
      
      if (updateError) {
        alert('Erreur base : ' + updateError.message);
        return;
      }
      
      const { data: linkUrl, error: linkError } = await supabase.rpc('generate_link_for_user', {
        p_user_id: user.id
      });
      
      if (linkError) {
        alert('Erreur génération lien : ' + linkError.message);
        return;
      }
      
      alert('Don validé ! Redirection vers votre hub...');
      window.location.href = 'hub.html';
    };
  </script>
</head>
<body>
  <div class="container">
    <h1>💰 Validation du don</h1>
    <p style="color:#cbd5e1;">Entrez votre preuve de don (hash de transaction) et votre wallet.</p>
    <input type="text" id="txHash" placeholder="Hash de transaction (ex: 0xVictory123)">
    <input type="text" id="wallet" placeholder="Votre adresse wallet">
    <button onclick="validateDonation()">Valider & générer mon lien</button>
  </div>
</body>
</html>
