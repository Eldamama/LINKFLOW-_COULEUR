<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkFlow | Global Follow-Me System</title>
    <style>
        :root { --primary: #0f4c5f; --success: #2a9d8f; --warning: #ffb703; --light: #f4f7f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .main-container { max-width: 550px; width: 100%; background: white; border-radius: 2.5rem; padding: 2rem; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
        .header-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .lang-select { border: 1px solid #ddd; border-radius: 10px; padding: 5px; font-size: 0.8rem; outline: none; cursor: pointer; }
        .auth-nav { font-size: 0.8rem; color: var(--primary); font-weight: bold; cursor: pointer; }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo img { width: 130px; }
        .input-group { position: relative; margin: 10px 0; }
        input { width: 100%; padding: 15px 25px; border: 1px solid #ddd; border-radius: 50px; outline: none; font-size: 0.95rem; }
        .toggle-pwd { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.6; }
        .btn { width: 100%; padding: 16px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; font-size: 1rem; text-align: center; display: block; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #algo-popup { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; margin: 15px 0; border: 3px solid var(--primary); }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .timer { font-size: 1.3rem; font-weight: bold; color: #e63946; text-align: center; margin: 10px 0; }
        .step-box { display: none; }
        .active-step { display: block; }
        .info-card { background: #f0f7f9; padding: 15px; border-radius: 15px; font-size: 0.85rem; border-left: 5px solid var(--success); margin-bottom: 15px; }
        .hidden { display: none !important; }
        .interaction-hint { font-size: 0.75rem; color: var(--primary); font-weight: bold; text-align: center; margin-top: -10px; margin-bottom: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-tools">
        <select id="lang-switch" class="lang-select">
            <option value="fr">🇫🇷 FR</option>
            <option value="en">🇬🇧 EN</option>
            <option value="es">🇪🇸 ES</option>
            <option value="pt">🇧🇷 PT</option>
        </select>
        <div id="auth-status" class="auth-nav" onclick="location.reload()" data-i18n="nav_login">Connexion</div>
    </div>

    <div class="logo"><img src="logo.png" alt="LinkFlow"></div>

    <div id="step-1" class="step-box active-step">
        <h2 id="auth-title" style="text-align:center; color:var(--primary); margin-bottom:15px;" data-i18n="register_title">Créer un compte</h2>
        <div class="input-group">
            <input type="email" id="email" data-i18n-ph="ph_email" placeholder="Email">
        </div>
        <div class="input-group">
            <input type="password" id="pass" data-i18n-ph="ph_pass" placeholder="Mot de passe">
            <span class="toggle-pwd" onclick="togglePassword()">👁️</span>
        </div>
        <input type="text" id="sponsor-id" readonly style="background:#f8f9fa; color:#666; font-size:0.8rem; text-align:center;">
        <button class="btn btn-blue" onclick="processAuth()" data-i18n="btn_start">Démarrer</button>
    </div>

    <div id="algo-popup" class="hidden">
        <h2 style="color:var(--warning);" data-i18n="algo_title">Stratégie Virale</h2>
        <p style="margin:20px 0; line-height:1.6; font-size: 0.9rem;" data-i18n="algo_text">Interagissez avec la vidéo pour propulser le système !</p>
        <div id="popup-chrono" class="timer">10s</div>
        <button id="btn-popup-close" class="btn btn-blue" disabled onclick="closePopupAndStartVideo()" data-i18n="btn_watch">Je regarde la vidéo</button>
    </div>

    <div id="step-2" class="step-box">
        <div class="video-box">
            <iframe id="player" src="https://www.youtube.com/embed/9uPybhkqYw4?controls=1&rel=0&modestbranding=1" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <p class="interaction-hint" data-i18n="hint_interact">👆 LIKEZ & ABONNEZ-VOUS POUR ACTIVER L'ALGORITHME</p>
        <div id="video-chrono" class="timer">⏱️ 180s</div>
        <button id="btn-next-vic" class="btn btn-green" disabled onclick="goToStep3()" data-i18n="btn_get_vic">Obtenir le lien de mon parrain</button>
    </div>

    <div id="step-3" class="step-box">
        <h2 id="sponsor-name-display" style="text-align:center; color:var(--primary); margin-bottom:10px;"></h2>
        <div class="info-card" data-i18n="pay_info">...</div>
        <a href="#" id="vic-external-link" target="_blank" class="btn btn-blue" data-i18n="btn_join_vic">S'inscrire sur Victory</a>
        <input type="text" id="target-addr" data-i18n-ph="ph_target" placeholder="Adresse Cible">
        <input type="text" id="tx-hash" data-i18n-ph="ph_hash" placeholder="Hash Transaction">
        <button class="btn btn-green" onclick="verifyEverything()" data-i18n="btn_verify">Vérifier mon don</button>
    </div>

    <div id="step-6" class="step-box">
        <h2 style="color:var(--success); text-align:center;" data-i18n="final_title">Activation Réussie</h2>
        <input type="text" id="my-vic-url" data-i18n-ph="ph_vic_link" placeholder="Lien Victory personnel">
        <button class="btn btn-green" onclick="generateLinkflow()" data-i18n="btn_activate">Générer mon LinkFlow</button>
        <div id="final-zone" class="hidden">
            <div class="info-card" style="text-align:center; border: 2px solid var(--success);">
                <b data-i18n="your_link">VOTRE LIEN VIRAL :</b><br>
                <code id="final-link-display" style="font-weight:bold; color:var(--primary);"></code>
            </div>
            <a id="opp2-follow-link" href="#" target="_blank" class="btn btn-blue" style="background:#000;">Victory World Club</a>
        </div>
    </div>
</div>

<script>
    const i18n = {
        fr: {
            nav_login: "Connexion", register_title: "Créer un compte", ph_email: "Email", ph_pass: "Mot de passe", btn_start: "Démarrer",
            algo_title: "Stratégie Virale", algo_text: "L'interaction propulse la vidéo. Vidéo virale = Inscriptions massives sous vous !", btn_watch: "Je regarde la vidéo",
            hint_interact: "👆 LIKEZ & ABONNEZ-VOUS POUR L'ALGORITHME", btn_get_vic: "Lien Victory de mon parrain", 
            pay_info: "1. S'inscrire sur Victory. 2. Coller l'adresse cible. 3. Payer et coller le Hash.",
            btn_join_vic: "S'inscrire sur Victory Automatic", ph_target: "📍 Adresse Cible", ph_hash: "🔗 Hash Transaction", btn_verify: "Vérifier mon don",
            final_title: "Activation Réussie", ph_vic_link: "Lien Victory (ex: .../ref/AFEG1000)", btn_activate: "Générer mon LinkFlow", your_link: "VOTRE LIEN VIRAL :"
        },
        en: {
            nav_login: "Login", register_title: "Create Account", ph_email: "Email", ph_pass: "Password", btn_start: "Start",
            algo_title: "Viral Strategy", algo_text: "Interaction boosts video. Viral video = Massive signups under you!", btn_watch: "I'm watching the video",
            hint_interact: "👆 LIKE & SUBSCRIBE FOR THE ALGORITHM", btn_get_vic: "Sponsor's Victory link", 
            pay_info: "1. Join Victory. 2. Paste target address. 3. Pay and paste Hash.",
            btn_join_vic: "Join Victory Automatic", ph_target: "📍 Target Address", ph_hash: "🔗 Transaction Hash", btn_verify: "Verify my donation",
            final_title: "Success Activation", ph_vic_link: "Victory Link (ex: .../ref/AFEG1000)", btn_activate: "Generate LinkFlow", your_link: "YOUR VIRAL LINK:"
        },
        es: {
            nav_login: "Conexión", register_title: "Crear cuenta", ph_email: "Correo", ph_pass: "Contraseña", btn_start: "Iniciar",
            algo_title: "Estrategia Viral", algo_text: "La interacción impulsa el video. ¡Video viral = Inscripciones masivas!", btn_watch: "Veo el video",
            hint_interact: "👆 ¡LIKE Y SUSCRÍBETE PARA EL ALGORITMO!", btn_get_vic: "Enlace Victory de mi padrino", 
            pay_info: "1. Unirse a Victory. 2. Pegar dirección. 3. Pagar y pegar Hash.",
            btn_join_vic: "Unirse a Victory Automatic", ph_target: "📍 Dirección Destino", ph_hash: "🔗 Hash de Transacción", btn_verify: "Verificar mi donación",
            final_title: "Activación Exitosa", ph_vic_link: "Enlace Victory (ej: .../ref/AFEG1000)", btn_activate: "Generar mi LinkFlow", your_link: "TU ENLACE VIRAL:"
        },
        pt: {
            nav_login: "Entrar", register_title: "Criar conta", ph_email: "E-mail", ph_pass: "Senha", btn_start: "Iniciar",
            algo_title: "Estrategia Viral", algo_text: "A interação impulsiona o vídeo. Vídeo viral = Inscrições massivas!", btn_watch: "Eu assisto ao vídeo",
            hint_interact: "👆 LIKE E INSCREVA-SE PARA O ALGORITMO", btn_get_vic: "Link Victory do padrinho", 
            pay_info: "1. Juntar-se à Victory. 2. Colar endereço. 3. Pagar e colar o Hash.",
            btn_join_vic: "Juntar-se à Victory Automatic", ph_target: "📍 Endereço de Destino", ph_hash: "🔗 Hash da Transação", btn_verify: "Verificar doação",
            final_title: "Ativação de Sucesso", ph_vic_link: "Link Victory (ex: .../ref/AFEG1000)", btn_activate: "Generar meu LinkFlow", your_link: "SEU LINK VIRAL:"
        }
    };

    // Logique de switch de langue
    function switchLang(lang) {
        document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = i18n[lang][el.getAttribute('data-i18n')]; });
        document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = i18n[lang][el.getAttribute('data-i18n-ph')]; });
    }
    document.getElementById('lang-switch').onchange = (e) => switchLang(e.target.value);

    // Initialisation Parrain
    const urlParams = new URLSearchParams(window.location.search);
    const initialSponsor = (urlParams.get('ref') || "AFEG1000").toUpperCase();
    document.getElementById('sponsor-id').value = "SPONSOR : " + initialSponsor;

    function togglePassword() { const p = document.getElementById('pass'); p.type = p.type === "password" ? "text" : "password"; }

    function processAuth() {
        document.getElementById('algo-popup').classList.remove('hidden');
        let s = 10;
        const t = setInterval(() => {
            s--; document.getElementById('popup-chrono').innerText = s + "s";
            if(s <= 0) { clearInterval(t); document.getElementById('btn-popup-close').disabled = false; }
        }, 1000);
    }

    function closePopupAndStartVideo() {
        document.getElementById('algo-popup').classList.add('hidden');
        document.getElementById('step-1').classList.remove('active-step');
        document.getElementById('step-2').classList.add('active-step');
        let s = 180;
        const t = setInterval(() => {
            s--; document.getElementById('video-chrono').innerText = "⏱️ " + s + "s";
            if(s <= 0) { clearInterval(t); document.getElementById('btn-next-vic').disabled = false; }
        }, 1000);
    }

    function goToStep3() {
        document.getElementById('step-2').classList.remove('active-step');
        document.getElementById('step-3').classList.add('active-step');
        document.getElementById('sponsor-name-display').innerText = "Sponsor : " + initialSponsor;
        document.getElementById('vic-external-link').href = "https://victoryauto.app/ref/" + initialSponsor;
    }

    function verifyEverything() {
        if(document.getElementById('target-addr').value.length > 20) {
            document.getElementById('step-3').classList.remove('active-step');
            document.getElementById('step-6').classList.add('active-step');
        }
    }

    function generateLinkflow() {
        const val = document.getElementById('my-vic-url').value;
        const regex = /ref\/([A-Z]{4}[0-9]{4})$/i;
        const match = val.match(regex);
        if(match) {
            document.getElementById('final-link-display').innerText = window.location.origin + window.location.pathname + "?ref=" + match[1].toUpperCase();
            document.getElementById('final-zone').classList.remove('hidden');
            document.getElementById('opp2-follow-link').href = "https://victoryworld.club/longa01?ref=" + initialSponsor;
        }
    }

    switchLang('fr');
</script>
</body>
</html>
