<head>
  <meta charset="UTF-8">
  <title>Mon PWA</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2196f3">
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js")
        .then(() => console.log("✅ Service Worker enregistré"))
        .catch(err => console.error("❌ Erreur SW :", err));
    }
  </script>
</head>

<body>
  <div id="auth-zone">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Mot de passe">
    <span onclick="toggleView()">👁️</span>
    <button onclick="doRegister()">S'inscrire</button>
    <a href="#" onclick="doForgot()">Mot de passe oublié ?</a>
  </div>

  <div id="video-zone" class="hidden">
    <button onclick="startVideoProcess()">🎬 Ouvrir YouTube</button>
    <p id="status-msg">Cliquez pour démarrer la synchronisation</p>
    <button id="btn-validate-video" disabled onclick="verifyVideo()">J'ai fini le visionnage</button>
  </div>

  <script>
  async function startVideoProcess() {
      // 1. On informe le serveur du début
      await fetch('/api/video/start', { 
        method: 'POST', 
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId: currentUserId }) 
      });
      
      // 2. On ouvre la vidéo dans un nouvel onglet
      window.open("https://youtube.com/...", "_blank");

      // 3. On active le bouton de validation après 180s
      setTimeout(() => {
          document.getElementById('btn-validate-video').disabled = false;
      }, 180000);
  }

  async function verifyVideo() {
      const res = await fetch('/api/video/verify', { 
        method: 'POST', 
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId: currentUserId }) 
      });
      const data = await res.json();
      
      if(data.success) {
          alert("Bravo ! Étape suivante débloquée.");
          showStep3();
      } else {
          alert(data.message); // "Trop tôt ! Revenez dans X secondes"
      }
  }
  </script>
</body>
