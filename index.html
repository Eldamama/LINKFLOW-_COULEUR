<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkFlow | Global Victory System</title>
    <style>
        :root {
            --primary-blue: #0f4c5f;
            --light-blue: #136b8d;
            --victory-green: #2a9d8f;
            --victory-yellow: #ffb703;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(145deg, #f5f7fc 0%, #eef2f6 100%); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .main-container { max-width: 600px; width: 100%; background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); padding: 2rem; position: relative; }
        
        /* Header & Langues */
        .header-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .lang-selector select { border: 1px solid #ddd; border-radius: 10px; padding: 5px; font-size: 0.8rem; cursor: pointer; }
        .auth-status { font-size: 0.8rem; color: var(--light-blue); font-weight: bold; }

        .logo-container { text-align: center; margin-bottom: 1.5rem; }
        .logo-container img { width: 140px; height: auto; }

        .step-indicator { display: flex; gap: 10px; margin-bottom: 2rem; }
        .step { flex: 1; height: 6px; background: #e9ecef; border-radius: 10px; }
        .step.active { background: var(--victory-green); }

        h2 { color: var(--primary-blue); text-align: center; margin-bottom: 1rem; font-size: 1.3rem; }
        
        /* Formulaires */
        .input-group { position: relative; margin: 8px 0; }
        input { width: 100%; padding: 14px 20px; border: 1px solid #cbdbe2; border-radius: 60px; outline: none; font-size: 1rem; }
        .toggle-pwd { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2rem; }
        
        .forgot-link { display: block; text-align: right; font-size: 0.8rem; margin: 5px 15px; color: var(--light-blue); text-decoration: none; }
        
        .btn { width: 100%; padding: 16px; border-radius: 60px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 1rem; text-align: center; display: block; text-decoration: none; }
        .btn-primary { background: var(--light-blue); color: white; }
        .btn-success { background: var(--victory-green); color: white; }
        .btn-outline { border: 2px solid var(--light-blue); color: var(--light-blue); background: transparent; margin-top: 5px; padding: 10px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; margin: 15px 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .timer { font-size: 1.2rem; text-align: center; font-weight: bold; color: #e63946; margin: 15px 0; background: #fff1f2; padding: 10px; border-radius: 50px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-tools">
        <div class="lang-selector">
            <select id="lang-switch">
                <option value="fr">🇫🇷 Français</option>
                <option value="en">🇬🇧 English</option>
                <option value="es">🇪🇸 Español</option>
                <option value="pt">🇧🇷 Português</option>
            </select>
        </div>
        <div id="user-display" class="auth-status hidden">
            <span id="current-user"></span> | <a href="#" id="btn-logout" style="color:red;">Déconnexion</a>
        </div>
    </div>

    <div class="logo-container">
        <img src="logo.png" alt="LinkFlow Logo">
    </div>

    <div class="step-indicator">
        <div id="bar1" class="step active"></div>
        <div id="bar2" class="step"></div>
        <div id="bar3" class="step"></div>
        <div id="bar4" class="step"></div>
    </div>

    <div id="sec-auth">
        <h2 data-i18n="auth_title">Accédez à votre Système</h2>
        
        <div id="login-view">
            <div class="input-group">
                <input type="email" id="log-email" placeholder="Email">
            </div>
            <div class="input-group">
                <input type="password" id="log-pass" placeholder="Mot de passe">
                <span class="toggle-pwd" onclick="togglePass('log-pass')">👁️</span>
            </div>
            <a href="#" class="forgot-link" data-i18n="forgot_pwd">Mot de passe oublié ?</a>
            <button class="btn btn-primary" id="btn-login" data-i18n="btn_login">Se connecter</button>
            <button class="btn btn-outline" id="go-register" data-i18n="btn_no_account">Pas de compte ? S'inscrire</button>
        </div>

        <div id="register-view" class="hidden">
            <div class="input-group">
                <input type="email" id="reg-email" placeholder="Email">
            </div>
            <div class="input-group">
                <input type="password" id="reg-pass" placeholder="Mot de passe">
                <span class="toggle-pwd" onclick="togglePass('reg-pass')">👁️</span>
            </div>
            <input type="text" id="ref-code" placeholder="Code parrain" readonly style="background:#f8f9fa;">
            <button class="btn btn-primary" id="btn-do-register" data-i18n="btn_register">Créer mon compte Viral</button>
            <button class="btn btn-outline" id="go-login" data-i18n="btn_have_account">Déjà inscrit ? Connexion</button>
        </div>
    </div>

    <div id="sec-video" class="hidden">
        <h2 data-i18n="video_title">Séance Stratégique</h2>
        <div class="video-wrapper">
            <iframe id="yt-player" src="https://www.youtube.com/embed/9uPybhkqYw4?autoplay=1&rel=0&enablejsapi=1" frameborder="0" allowfullscreen></iframe>
        </div>
        <div id="timer-display" class="timer">⏱️ 180s</div>
        <button id="btn-to-pay" class="btn btn-success" disabled data-i18n="btn_next">Accéder à Victory</button>
    </div>

    <div id="sec-payment" class="hidden">
        <h2 data-i18n="pay_title">Activation Victory</h2>
        <a href="#" id="vic1-link" target="_blank" class="btn btn-primary">👉 Victory Automatic (Step 1)</a>
        <div style="margin-top:15px;">
            <input type="text" id="target-addr" placeholder="Adresse cible Victory">
            <input type="text" id="tx-hash" placeholder="Hash de transaction (2.03 USDT)">
            <button id="btn-verify" class="btn btn-success" data-i18n="btn_verify">Vérifier mon don</button>
        </div>
    </div>

    <div id="sec-final" class="hidden">
        <h2 data-i18n="final_title">Vos Liens de Succès</h2>
        <div class="instruction-box" style="background:#e7f3ef; text-align:center;">
            <b data-i18n="your_link">Votre lien LinkFlow :</b><br>
            <code id="my-link" style="color:var(--primary-blue); font-weight:bold;">---</code>
        </div>
        
        <div style="margin-top:20px; border-top: 2px dashed #ddd; padding-top:20px;">
            <h2 style="color:var(--victory-yellow)">🚀 Opportunité 2</h2>
            <p style="font-size:0.8rem; text-align:center; margin-bottom:10px;" data-i18n="opp2_desc">Boostez vos gains avec Victory World Club</p>
            <a href="https://victoryworld.club/longa01" target="_blank" class="btn btn-primary" style="background:black;">🔥 Victory World Club</a>
        </div>
    </div>
</div>

<script>
    // --- TRADUCTIONS ---
    const i18n = {
        fr: {
            auth_title: "Accédez à votre Système", btn_login: "Se connecter", btn_register: "Créer mon compte",
            forgot_pwd: "Mot de passe oublié ?", video_title: "Séance Stratégique", btn_next: "Passer à Victory",
            pay_title: "Activation Victory", btn_verify: "Vérifier mon don", final_title: "Vos Liens de Succès",
            your_link: "Votre lien LinkFlow :", opp2_desc: "Boostez vos gains avec Victory World Club",
            btn_no_account: "Pas de compte ? S'inscrire", btn_have_account: "Déjà inscrit ? Connexion"
        },
        en: {
            auth_title: "Access your System", btn_login: "Login", btn_register: "Create Account",
            forgot_pwd: "Forgot Password?", video_title: "Strategic Session", btn_next: "Go to Victory",
            pay_title: "Victory Activation", btn_verify: "Verify Donation", final_title: "Success Links",
            your_link: "Your LinkFlow URL:", opp2_desc: "Boost your earnings with Victory World Club",
            btn_no_account: "No account? Sign up", btn_have_account: "Already registered? Login"
        },
        es: {
            auth_title: "Accede a tu Sistema", btn_login: "Iniciar Sesión", btn_register: "Crear Cuenta",
            forgot_pwd: "¿Olvidaste tu contraseña?", video_title: "Sesión Estratégica", btn_next: "Ir a Victory",
            pay_title: "Activación Victory", btn_verify: "Verificar Donación", final_title: "Enlaces de Éxito",
            your_link: "Tu enlace LinkFlow:", opp2_desc: "Aumenta tus ganancias con Victory World Club",
            btn_no_account: "¿Sin cuenta? Regístrate", btn_have_account: "¿Ya tienes cuenta? Conectar"
        },
        pt: {
            auth_title: "Aceda ao seu Sistema", btn_login: "Entrar", btn_register: "Criar Conta",
            forgot_pwd: "Esqueceu a senha?", video_title: "Sessão Estratégica", btn_next: "Ir para Victory",
            pay_title: "Ativação Victory", btn_verify: "Verificar Doação", final_title: "Links de Sucesso",
            your_link: "Seu link LinkFlow:", opp2_desc: "Aumente seus ganhos com Victory World Club",
            btn_no_account: "Não tem conta? Registar", btn_have_account: "Já registrado? Entrar"
        }
    };

    // --- LOGIQUE INTERFACE ---
    function switchLang(lang) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            el.innerText = i18n[lang][key];
        });
    }

    document.getElementById('lang-switch').onchange = (e) => switchLang(e.target.value);

    function togglePass(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }

    // Navigation Vues Auth
    document.getElementById('go-register').onclick = () => {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('register-view').classList.remove('hidden');
    };
    document.getElementById('go-login').onclick = () => {
        document.getElementById('register-view').classList.add('hidden');
        document.getElementById('login-view').classList.remove('remove'); // Note: fixed logic in final deployment
        location.reload(); 
    };

    // --- FLUX DE NAVIGATION ---
    let timeLeft = 180;
    document.getElementById('btn-login').onclick = () => login();
    document.getElementById('btn-do-register').onclick = () => login();

    function login() {
        document.getElementById('sec-auth').classList.add('hidden');
        document.getElementById('sec-video').classList.remove('hidden');
        document.getElementById('user-display').classList.remove('hidden');
        document.getElementById('current-user').innerText = "User_789"; 
        startTimer();
    }

    function startTimer() {
        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-display').innerText = `⏱️ ${timeLeft}s`;
            if(timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('btn-to-pay').disabled = false;
            }
        }, 1000);
    }

    document.getElementById('btn-to-pay').onclick = () => {
        document.getElementById('sec-video').classList.add('hidden');
        document.getElementById('sec-payment').classList.remove('hidden');
    };

    document.getElementById('btn-verify').onclick = () => {
        const hash = document.getElementById('tx-hash').value;
        if(hash.length > 30) {
            document.getElementById('sec-payment').classList.add('hidden');
            document.getElementById('sec-final').classList.remove('hidden');
            document.getElementById('my-link').innerText = window.location.origin + "?ref=USER789";
        } else { alert("Hash invalide"); }
    };

    document.getElementById('btn-logout').onclick = () => location.reload();

    // Initialisation
    switchLang('fr');
</script>

</body>
</html>
