<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Connexion Point Focal
</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="container">

<img
src="images/logo.png"
class="logo"
>

<h1>

Connexion

</h1>

<p class="step-message">

Connectez-vous à votre compte
Point Focal.

</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Votre email"
required
>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Mot de passe"
required
>

<button
type="button"
class="show-pass"
onclick="togglePassword('password')"
>

👁

</button>

</div>

<button type="submit">

Connexion

</button>

</form>

<div class="auth-links">

<a href="forgot-password.html">

Mot de passe oublié ?

</a>

</div>

<div class="auth-links">

<p>

Pas encore de compte ?

</p>

<a href="register.html">

Créer un compte

</a>

</div>

</div>

<script src="js/app.js"></script>

<script>

function togglePassword(id){

 const field =
 document.getElementById(id);

 if(field.type === 'password'){

   field.type = 'text';

 }else{

   field.type = 'password';

 }

}

document
.getElementById('loginForm')

.onsubmit = function(e){

 e.preventDefault();

 window.location.href =
 'dashboard.html';

};

</script>

</body>

</html>
