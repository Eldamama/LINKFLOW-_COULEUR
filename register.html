<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Inscription Point Focal
</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="container">

<img
src="images/logo.png"
class="logo"
>

<h1>
Créer un compte
</h1>

<p class="step-message">

Étape 1 :
Créez votre compte Point Focal.

</p>

<form id="registerForm">

<input
type="email"
id="email"
placeholder="Votre email"
required
>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Mot de passe"
required
>

<button
type="button"
class="show-pass"
onclick="togglePassword('password')"
>

👁

</button>

</div>

<div class="password-box">

<input
type="password"
id="confirmPassword"
placeholder="Confirmation mot de passe"
required
>

<button
type="button"
class="show-pass"
onclick="togglePassword('confirmPassword')"
>

👁

</button>

</div>

<button type="submit">

Créer mon compte

</button>

</form>

</div>

<div id="popup"
class="popup hidden">

<h1 class="important">

IMPORTANT

</h1>

<p>

Regardez entièrement la vidéo.

Likez, partagez et commentez.

Plus la vidéo devient virale,
plus le réseau grandit.

Partagez uniquement
votre lien Point Focal personnel.

Ne partagez jamais
directement YouTube.

</p>

<div id="countdown">

10

</div>

<button
id="videoBtn"
disabled
onclick="startVideo()"
>

Je regarde la vidéo

</button>

</div>

<script src="js/app.js"></script>

<script src="js/timer.js"></script>

<script>

saveSponsor();

document
.getElementById('registerForm')

.onsubmit = function(e){

e.preventDefault();

const password =
document.getElementById('password').value;

const confirmPassword =
document.getElementById('confirmPassword').value;

if(password !== confirmPassword){

 alert(
 'Les mots de passe ne correspondent pas'
 );

 return;

}

showPopup();

};

</script>

</body>

</html>
